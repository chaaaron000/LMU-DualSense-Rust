[app]
tick_hz = 60
telemetry_source = "mock"
output = "null"
log_level = "info"

[lmu]
shared_memory_name = "LMU_Data"

[dsx]
host = "127.0.0.1"
# Omit port to read C:\Temp\DualSenseX\DualSenseX_PortNumber.txt,
# then fall back to 6969.
controller_index = 0

[effects.brake]
enabled = true
deadzone = 0.03
min_force = 1
max_force = 8
start_position = 2
abs_pulse_force = 9
abs_pulse_frequency = 8

[effects.throttle]
enabled = true
deadzone = 0.03
min_force = 0
max_force = 4
start_position = 2
tc_pulse_force = 6
tc_pulse_frequency = 7

[effects.rpm]
enabled = true
rev_limit_ratio = 0.97
vibration_force = 7
vibration_frequency = 10

[smoothing]
enabled = true
attack = 0.45
release = 0.25
